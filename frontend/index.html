<!DOCTYPE html>
<html>
<head>
  <title>AI Business Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #0f172a, #1e293b);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 33%;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      background: linear-gradient(45deg, #3b82f6, #06b6d4);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    canvas {
      background: white;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 AI Business Assistant Dashboard</h1>

<div class="container">

  <!-- SALES -->
  <div class="card">
    <h2>📊 Sales Prediction</h2>
    <input type="number" id="month" placeholder="Enter month">
    <button onclick="predictSales()">Predict</button>
    <p id="salesResult"></p>
    <canvas id="salesChart"></canvas>
  </div>

  <!-- SEGMENT -->
  <div class="card">
    <h2>👥 Customer Segmentation</h2>
    <input type="number" id="spending" placeholder="Enter spending">
    <button onclick="segment()">Segment</button>
    <p id="clusterResult"></p>
    <canvas id="clusterChart"></canvas>
  </div>

  <!-- RECOMMEND -->
  <div class="card">
    <h2>🛒 Product Recommendation</h2>
    <input id="product" placeholder="Enter product">
    <button onclick="recommend()">Recommend</button>
    <ul id="recommendResult"></ul>
  </div>

</div>

<script>
const API = "https://ai-business-assistant-1pd5.onrender.com";

let salesChart, clusterChart;

// ===== SALES =====
async function predictSales() {
  const month = document.getElementById("month").value;

  const res = await fetch(`${API}/predict_sales?month=${month}`);
  const data = await res.json();

  document.getElementById("salesResult").innerText =
    "Prediction: " + data.current;

  updateSalesChart(data.months, data.trend);
}

function updateSalesChart(labels, dataPoints) {
  if (salesChart) salesChart.destroy();

  salesChart = new Chart(document.getElementById("salesChart"), {
    type: "bar",
    data: {
      labels: labels,
      datasets: [{
        label: "Sales Trend",
        data: dataPoints
      }]
    }
  });
}

// ===== SEGMENT =====
async function segment() {
  const spending = document.getElementById("spending").value;

  const res = await fetch(`${API}/predict_cluster?spending=${spending}`);
  const data = await res.json();

  if (data.cluster !== undefined) {
    document.getElementById("clusterResult").innerText =
      "Cluster: " + data.cluster;

    updateClusterChart(data.input, data.cluster, data.centers);
  } else {
    document.getElementById("clusterResult").innerText =
      "Error: " + data.error;
  }
}

function updateClusterChart(input, cluster, centers) {
  if (clusterChart) clusterChart.destroy();

  const centerPoints = centers.map((c, i) => ({
    x: c[0],
    y: i
  }));

  clusterChart = new Chart(document.getElementById("clusterChart"), {
    type: "scatter",
    data: {
      datasets: [
        {
          label: "Cluster Centers",
          data: centerPoints
        },
        {
          label: "Your Input",
          data: [{ x: input, y: cluster }],
          pointRadius: 10
        }
      ]
    },
    options: {
      scales: {
        x: { title: { display: true, text: "Spending" } },
        y: { title: { display: true, text: "Cluster" }, ticks: { stepSize: 1 } }
      }
    }
  });
}

// ===== RECOMMEND =====
async function recommend() {
  const product = document.getElementById("product").value;

  const res = await fetch(`${API}/recommend_products?product=${encodeURIComponent(product)}`);
  const data = await res.json();

  const list = document.getElementById("recommendResult");
  list.innerHTML = "";

  if (data.recommendations) {
    data.recommendations.forEach(p => {
      const li = document.createElement("li");
      li.innerText = p;
      list.appendChild(li);
    });
  } else {
    list.innerHTML = "<li>Error: " + data.error + "</li>";
  }
}
</script>

</body>
</html>
