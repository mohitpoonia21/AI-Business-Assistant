<!DOCTYPE html>
<html>
<head>
  <title>AI Business Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #0f172a, #1e293b);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 33%;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px;
      background: linear-gradient(45deg, #3b82f6, #06b6d4);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
    }

    canvas {
      background: white;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>🚀 AI Business Assistant Dashboard</h1>

<div class="container">

  <!-- SALES -->
  <div class="card">
    <h2>📊 Sales Prediction</h2>
    <input type="number" id="month" placeholder="Enter month">
    <button onclick="predictSales()">Predict</button>
    <p id="salesResult"></p>
    <canvas id="salesChart"></canvas>
  </div>

  <!-- SEGMENT -->
  <div class="card">
    <h2>👥 Customer Segmentation</h2>
    <input type="number" id="spending" placeholder="Enter spending">
    <button onclick="segment()">Segment</button>
    <p id="clusterResult"></p>
    <canvas id="clusterChart"></canvas>
  </div>

  <!-- RECOMMEND -->
  <div class="card">
    <h2>🛒 Product Recommendation</h2>

    <input list="products" id="product" placeholder="Enter product">
    <datalist id="products">
      <option value="white hanging heart t-light holder">
      <option value="regency cakestand 3 tier">
    </datalist>

    <button onclick="recommend()">Recommend</button>
    <ul id="recommendResult"></ul>
  </div>

</div>

<script>
const API = "https://ai-business-assistant-1pd5.onrender.com";

// SALES
async function predictSales() {
  const month = document.getElementById("month").value;
  const res = await fetch(`${API}/predict_sales?month=${month}`);
  const data = await res.json();

  document.getElementById("salesResult").innerText =
    "Prediction: " + data.prediction;

  new Chart(document.getElementById("salesChart"), {
    type: "bar",
    data: {
      labels: ["Sales"],
      datasets: [{ label: "Prediction", data: [data.prediction] }]
    }
  });
}

// SEGMENT
async function segment() {
  const spending = document.getElementById("spending").value;
  const res = await fetch(`${API}/predict_cluster?spending=${spending}`);
  const data = await res.json();

  document.getElementById("clusterResult").innerText =
    "Cluster: " + data.cluster;

  new Chart(document.getElementById("clusterChart"), {
    type: "pie",
    data: {
      labels: ["Cluster", "Others"],
      datasets: [{ data: [1, 3] }]
    }
  });
}

// RECOMMEND
async function recommend() {
  const product = document.getElementById("product").value;

  const res = await fetch(`${API}/recommend_products?product=${encodeURIComponent(product)}`);
  const data = await res.json();

  const list = document.getElementById("recommendResult");
  list.innerHTML = "";

  if (data.recommendations) {
    data.recommendations.forEach(p => {
      const li = document.createElement("li");
      li.innerText = p;
      list.appendChild(li);
    });
  } else {
    list.innerHTML = "<li>Error: " + data.error + "</li>";
  }
}
</script>

</body>
</html>
