<!DOCTYPE html>
<html>
<head>
  <title>AI Business Assistant</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      display: flex;
      justify-content: space-around;
      margin-top: 50px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      width: 30%;
    }

    input {
      width: 80%;
      padding: 10px;
      margin: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      padding: 10px 20px;
      background: #3b82f6;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    canvas {
      background: white;
      border-radius: 10px;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>🚀 AI Business Assistant Dashboard</h1>

<div class="container">

  <!-- SALES -->
  <div class="card">
    <h2>Sales Prediction</h2>
    <input type="number" id="month" placeholder="Enter month">
    <br>
    <button onclick="predictSales()">Predict</button>
    <p id="salesResult"></p>
    <canvas id="salesChart"></canvas>
  </div>

  <!-- CLUSTER -->
  <div class="card">
    <h2>Customer Segmentation</h2>
    <input type="number" id="spending" placeholder="Enter spending">
    <br>
    <button onclick="predictCluster()">Segment</button>
    <p id="clusterResult"></p>
    <canvas id="clusterChart"></canvas>
  </div>

  <!-- RECOMMEND -->
  <div class="card">
    <h2>Product Recommendation</h2>
    <input type="text" id="product" placeholder="Enter product name">
    <br>
    <button onclick="recommend()">Recommend</button>
    <ul id="recommendList"></ul>
  </div>

</div>

<script>
const API = "https://ai-business-assistant-1pd5.onrender.com";

let salesChart, clusterChart;

// SALES
async function predictSales() {
  const month = document.getElementById("month").value;

  const res = await fetch(`${API}/predict_sales?month=${month}`);
  const data = await res.json();

  document.getElementById("salesResult").innerText =
    "Prediction: " + data.prediction;

  if (salesChart) salesChart.destroy();

  salesChart = new Chart(document.getElementById("salesChart"), {
    type: "bar",
    data: {
      labels: ["Sales"],
      datasets: [{
        label: "Prediction",
        data: [data.prediction]
      }]
    }
  });
}

// CLUSTER
async function predictCluster() {
  const spending = document.getElementById("spending").value;

  const res = await fetch(`${API}/predict_cluster?spending=${spending}`);
  const data = await res.json();

  document.getElementById("clusterResult").innerText =
    "Cluster: " + data.cluster;

  if (clusterChart) clusterChart.destroy();

  clusterChart = new Chart(document.getElementById("clusterChart"), {
    type: "pie",
    data: {
      labels: ["Cluster", "Others"],
      datasets: [{
        data: [1, 3]
      }]
    }
  });
}

// RECOMMEND
async function recommend() {
  let product = document.getElementById("product").value;

  const res = await fetch(`${API}/recommend_products?product=${product}`);
  const data = await res.json();

  const list = document.getElementById("recommendList");
  list.innerHTML = "";

  if (data.error) {
    list.innerHTML = `<li>${data.error}</li>`;
    return;
  }

  data.recommendations.forEach(p => {
    list.innerHTML += `<li>${p}</li>`;
  });
}
</script>

</body>
</html>
